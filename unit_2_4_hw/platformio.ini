; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = task1

[env:base]
platform = ststm32
board = blackpill_f401cc
framework = arduino
upload_protocol = stlink
debug_tool = stlink

monitor_dtr = 1
monitor_speed = 115200

build_flags =
    -D PIO_FRAMEWORK_ARDUINO_ENABLE_CDC
    -D USBCON
    -D PLATFORM_STM32

[env:task1]
extends = env:base
build_src_filter = -<*> +<task1.cpp>

[env:task2]
extends = env:base
build_src_filter = -<*> +<task2.cpp>

[env:task3]
extends = env:base
build_src_filter = -<*> +<task3.cpp>

[env:task4]
extends = env:base
build_src_filter = -<*> +<task4.cpp>

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200

; ESP32-S3 quirk:
; When PlatformIO opens Serial Monitor it toggles DTR/RTS control lines.
; On this board those lines are wired to EN (reset) and GPIO0 (boot mode).
; That can accidentally reboot the chip into the bootloader (DOWNLOAD mode),
; stopping the running firmware.
; Disable them so opening the monitor does not reset the board.
monitor_dtr = 0
monitor_rts = 0

build_src_filter = -<*> +<task1.cpp>

build_flags = -D PLATFORM_ESP32
